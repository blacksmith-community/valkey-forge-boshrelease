processes:
- name: standalone-7
  executable: /var/vcap/packages/valkey-7/bin/valkey-server
  args:
  - /var/vcap/jobs/standalone-7/config/valkey.conf
  env:
    LANG: en_US.UTF-8
  limits:
    open_files: 65536
  ephemeral_disk: true
  persistent_disk: true
  unsafe:
    privileged: true
    host_pid_namespace: true
  capabilities:
  - NET_BIND_SERVICE
<% if p('persistent') %>
  workdir: /var/vcap/store/standalone-7
<% end %>
