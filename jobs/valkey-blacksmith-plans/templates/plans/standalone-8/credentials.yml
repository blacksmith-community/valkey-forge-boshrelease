---
credentials:
  host: (( grab params.hostname ))
<% if p("valkey.tls.enabled") && !p("valkey.tls.dual-mode") -%>
  port: 0
<% else -%>
  port: 6379
<% end -%>
  password: (( grab meta.password ))
<% if p("valkey.tls.enabled") -%>
<% if p("valkey.tls.dual-mode") -%>
  tls_port: 16379
<% else -%>
  tls_port: 6379
<% end -%>
  tls_versions: ["tlsv1.2","tlsv1.3"]
<% end -%>
