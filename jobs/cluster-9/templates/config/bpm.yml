processes:
- name: cluster-9
  executable: /var/vcap/packages/valkey-9/bin/valkey-server
  args:
  - /var/vcap/jobs/cluster-9/config/valkey.conf
  env:
    LANG: en_US.UTF-8
  limits:
    open_files: 65536
  ephemeral_disk: true
  persistent_disk: true
  unsafe:
    privileged: true
    host_pid_namespace: true
  capabilities:
  - NET_BIND_SERVICE
  workdir: /var/vcap/store/cluster-9
